# A versioned paint URL (?v=…) can never change meaning, so it is immutable;
# without the stamp we must revalidate. Applies to MATERIALS and TEXTURES alike:
# a texture's filename hashes its archive path, not its bytes, so a CS2 update
# can change the contents behind an identical name. (Item icons are exempt —
# their hash is cs2-lib's, over the image itself.) `map` is the if-free way to
# branch on a query arg inside a location.
map $arg_v $paints_cache {
  ""      "no-cache";
  default "public, max-age=31536000, immutable";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Kubelet probe target. Served by nginx itself (no filesystem, no upstream)
  # so it answers as soon as the container can serve anything at all — which
  # is exactly the signal readiness/liveness want.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # The panel imports remoteEntry.js cross-origin; allow any origin (public JS,
  # no credentials). Handled here in the container — not in the ingress.
  # Vite content-hashes everything under /assets/, so those URLs can never
  # change meaning — cache them hard. remoteEntry.js is the one exception and is
  # declared as an exact-match location below, which beats this prefix.
  location /assets/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Everything else the SPA serves — index.html above all — keeps a STABLE name
  # while its contents change every build, so it must never be cached. Stating
  # it here rather than relying on a Cloudflare rule keeps the origin the single
  # source of truth: an edge rule that blanket-bypasses this host also throws
  # away the immutable caching every asset route above asks for.
  location / {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ =404;
  }

  # CS2 weapon models come from the hostPath mount (not the image). 404s when
  # the mount is absent — the UI gates 3D rendering on exactly that.
  location /models/ {
    alias /cs2-models/models/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # CS2 paint materials/textures, extracted from this instance's own CS2
  # install onto the hostPath mount (scripts/extract-models.sh). Served
  # statically from here — there is no upstream mirror, so a miss is a 404 and
  # the viewer reports it rather than silently sourcing art from a third party.
  # Paint TEXTURES carry a content hash in the filename, so a URL never changes
  # meaning — cache them hard. Declared before the generic /paints/ block so it
  # wins for this prefix.
  location /paints/textures/ {
    alias /cs2-models/paints/textures/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control $paints_cache;
    try_files $uri @backend;
  }

  # Paint MATERIALS. Their filenames come from cs2-lib and are fixed, but every
  # extraction rewrites the contents — including the texture names they
  # reference. Cached for a day, a browser kept pointing at textures the newest
  # run had renamed, so they all 404'd and skins rendered white long after the
  # mount was correct.
  #
  # The client stamps ?v=<extraction version> on these (withAssetVersion), so a
  # versioned URL is safe to keep forever and an unversioned one revalidates.
  location /paints/ {
    alias /cs2-models/paints/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control $paints_cache;
    try_files $uri @backend;
  }

  # Econ item icons (weapon skins, stickers, agents, charms, cases...), same
  # extraction, same mount. Names carry a content hash, so they're immutable.
  location /images/ {
    alias /cs2-models/images/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri @backend;
  }

  location /renders/ {
    alias /cs2-models/renders/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @backend;
  }

  # Skin-test-suite renders — same mount + static-miss-to-backend pattern as
  # /renders. The backend writes them; nginx serves them once present.
  location /tests/ {
    alias /cs2-models/tests/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @backend;
  }

  location = /build-info.json {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location @backend {
    proxy_pass http://inventory-backend:3000;
    proxy_set_header Host $host;
  }

  # remoteEntry.js keeps a STABLE filename but its content changes every build,
  # so it must never be cached by a CDN (Cloudflare) — otherwise a stale copy
  # (or a cached 404) is served. Hashed /assets/* chunks stay cacheable.
  location = /assets/remoteEntry.js {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }
}
