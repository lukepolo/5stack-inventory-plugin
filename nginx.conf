server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Kubelet probe target. Served by nginx itself (no filesystem, no upstream)
  # so it answers as soon as the container can serve anything at all — which
  # is exactly the signal readiness/liveness want.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # The panel imports remoteEntry.js cross-origin; allow any origin (public JS,
  # no credentials). Handled here in the container — not in the ingress.
  location / {
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri $uri/ =404;
  }

  # CS2 weapon models come from the hostPath mount (not the image). 404s when
  # the mount is absent — the UI gates 3D rendering on exactly that.
  location /models/ {
    alias /cs2-models/models/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # Mirrored CS2 paint materials/textures (backend/scripts/mirror-paints.mjs)
  # live on the same hostPath mount; 404s here make the viewer fall back to
  # the public CDN per-file.
  location /paints/ {
    alias /cs2-models/paints/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=86400";
    # Miss -> backend fetches from the CDN, writes to the mount, serves it.
    # The NEXT request for the same file is served statically from here.
    try_files $uri @paints;
  }

  location /renders/ {
    alias /cs2-models/renders/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @paints;
  }

  # Skin-test-suite renders — same mount + static-miss-to-backend pattern as
  # /renders. The backend writes them; nginx serves them once present.
  location /tests/ {
    alias /cs2-models/tests/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @paints;
  }

  location = /build-info.json {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location @paints {
    proxy_pass http://inventory-backend:3000;
    proxy_set_header Host $host;
  }

  # remoteEntry.js keeps a STABLE filename but its content changes every build,
  # so it must never be cached by a CDN (Cloudflare) — otherwise a stale copy
  # (or a cached 404) is served. Hashed /assets/* chunks stay cacheable.
  location = /assets/remoteEntry.js {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }
}
