<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>seed audit</title>
    <style>
      body{margin:0;background:#111;color:#ccc;font:12.5px/1.55 ui-monospace,monospace;padding:14px}
      .pass{color:#7ddc7d}.fail{color:#ff7b6b}.warn{color:#e8c46a}.dim{color:#888}
      h2{font-size:13px;margin:18px 0 6px;color:#fff;font-weight:600}
      pre{margin:0;white-space:pre-wrap}
      .strip{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 2px}
      .strip figure{margin:0;text-align:center}
      .strip img{image-rendering:pixelated;width:150px;border:1px solid #333;display:block}
      .strip figcaption{font-size:10.5px;color:#777;padding-top:2px}
      table{border-collapse:collapse;margin:8px 0}
      td,th{border:1px solid #333;padding:3px 8px;text-align:left;font-weight:400}
      th{color:#fff;background:#1a1a1a}
    </style>
  </head>
  <body><div id="out"></div><script type="module" src="./seedaudit.ts"></script></body>
</html>
