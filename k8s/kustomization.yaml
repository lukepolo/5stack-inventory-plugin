apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: 5stack

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: inventory-config
    envs:
      - inventory.env

replacements:
  - source:
      kind: ConfigMap
      name: inventory-config
      fieldPath: data.INVENTORY_DOMAIN
    targets:
      - select:
          kind: Ingress
          name: inventory-api
        fieldPaths:
          - spec.rules.0.host
      - select:
          kind: Ingress
          name: inventory-frontend
        fieldPaths:
          - spec.rules.0.host
